services:
  shroom:
    build:
      context: ../..
      dockerfile: stacks/shroom/app/Dockerfile
    container_name: shroom
    restart: unless-stopped
    environment:
      - OLLAMA_URL=http://ollama:11434
      - NIGEHBAN_MODEL=llama3.2:3b
      - TICK_INTERVAL_MS=3000          # 3s real per sim tick
      - NIGEHBAN_INTERVAL_TICKS=600    # ~30 min real between his time-based wakes
      - NIGEHBAN_TIMEOUT_MS=120000     # llama3.2:3b on 4-core CPU takes 30–90s/call
      # Dev tools (uncomment to enable /api/dev/* — speed, ai toggle, fast-forward)
      # - SHROOM_DEV=true
      # - NIGEHBAN_DISABLED=true        # stop Nigehban while tuning the natural world
    volumes:
      - /opt/almari/data/shroom:/app/data
    networks:
      - traefik-public
      - ai
    labels:
      - traefik.enable=true
      - traefik.http.routers.shroom.rule=Host(`shroom.almari`)
      - traefik.http.routers.shroom.entrypoints=websecure
      - traefik.http.routers.shroom.tls=true
      - traefik.http.services.shroom.loadbalancer.server.port=3000
      - traefik.http.services.shroom.loadbalancer.responseforwarding.flushinterval=-1

networks:
  traefik-public:
    external: true
  ai:
    external: true
